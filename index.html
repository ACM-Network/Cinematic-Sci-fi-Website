<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JARVIS AI PRO</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Orbitron',sans-serif}
body{background:#030712;color:#0ff;overflow:hidden}
canvas{position:fixed;top:0;left:0;z-index:-1}

/* BOOT */
#boot{position:fixed;inset:0;background:black;display:flex;justify-content:center;align-items:center;flex-direction:column;z-index:999}

/* CORE */
.core{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%)}
.ring{width:260px;height:260px;border-radius:50%;border:2px solid cyan;animation:spin 6s linear infinite;box-shadow:0 0 40px cyan}
@keyframes spin{to{transform:translate(-50%,-50%) rotate(360deg)}}

/* PANELS */
.panel{position:absolute;padding:15px;border-radius:12px;background:rgba(0,255,255,0.05);border:1px solid rgba(0,255,255,0.3);backdrop-filter:blur(15px)}
#ai{top:20px;left:20px;width:260px}
#consolePanel{bottom:20px;left:50%;transform:translateX(-50%);width:90%;max-width:900px}

/* CHAT */
.chat{height:200px;overflow:auto;padding:10px}
.msg{margin:5px 0}
.user{color:#0ff}
.ai{color:#9ff}

input{width:70%;padding:10px;border-radius:8px;background:#000;border:1px solid cyan;color:#0ff}
button{padding:10px;border:none;border-radius:8px;background:cyan;color:#000;cursor:pointer}

</style>
</head>

<body>

<div id="boot">
<h1>JARVIS LOADING...</h1>
</div>

<canvas id="bg"></canvas>

<div class="core"><div class="ring"></div></div>

<div id="ai" class="panel">
<b>JARVIS</b><br>
<small id="status">Initializing...</small>
</div>

<div id="consolePanel" class="panel">
<div class="chat" id="chat"></div>
<input id="input" placeholder="Ask Jarvis...">
<button onclick="sendMsg()">Send</button>
<button onclick="startVoice()">🎤</button>
</div>

<script>
// BOOT + GREETING
setTimeout(()=>{
 boot.style.display='none';
 speak("Welcome back sir. Jarvis online.");
 addAI("Welcome back sir. Jarvis online.");
},2000)

// STARFIELD
const c=bg,ctx=c.getContext('2d');c.width=innerWidth;c.height=innerHeight;
let stars=Array.from({length:300},()=>({x:Math.random()*c.width,y:Math.random()*c.height,z:Math.random()*c.width}))
function draw(){ctx.fillStyle='#000';ctx.fillRect(0,0,c.width,c.height);
for(let s of stars){s.z--;if(s.z<=0)s.z=c.width;let k=128/s.z,x=s.x*k+c.width/2,y=s.y*k+c.height/2;ctx.fillStyle='cyan';ctx.fillRect(x,y,2,2)}requestAnimationFrame(draw)}draw()

// CHAT
function addUser(t){chat.innerHTML+=`<div class='msg user'>You: ${t}</div>`}
function addAI(t){chat.innerHTML+=`<div class='msg ai'>Jarvis: ${t}</div>`}

function sendMsg(){
 let t=input.value.trim();
 if(!t)return;
 addUser(t);
 process(t.toLowerCase());
 input.value='';
}

// COMMAND ENGINE
function process(v){
 if(v.includes('open youtube')){
  window.open('https://youtube.com');
  speak('Opening YouTube');
 }
 else if(v.includes('search')){
  let q=v.replace('search','');
  window.open('https://www.google.com/search?q='+q);
  speak('Searching '+q);
 }
 else if(v.includes('type')){
  speak('Browser security restricts typing into other sites');
  addAI('Cannot control external page inputs due to browser security');
 }
 else{
  speak('I can open sites and search. More AI requires API');
  addAI('Try: open youtube, search something');
 }
}

// SPEAK
function speak(t){speechSynthesis.speak(new SpeechSynthesisUtterance(t))}

// VOICE
function startVoice(){
 const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
 if(!SR){alert('Not supported');return}
 let r=new SR();r.continuous=false;r.lang='en-US';
 r.onresult=e=>{
  let t=e.results[0][0].transcript;
  input.value=t;
  sendMsg();
 };
 r.start();
}

</script>

</body>
</html>
