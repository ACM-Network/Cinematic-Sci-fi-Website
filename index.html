<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FocusX - Cinematic Productivity</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Orbitron',sans-serif}
body{background:#000;color:#fff;overflow:hidden}
canvas{position:fixed;top:0;left:0;z-index:-1}

.container{padding:20px;text-align:center}

h1{font-size:3rem;margin-bottom:10px;animation:glow 2s infinite alternate}
@keyframes glow{from{text-shadow:0 0 10px cyan}to{text-shadow:0 0 30px purple}}

input{
  padding:10px;
  width:60%;
  border:none;
  border-radius:10px;
  margin-top:20px;
}

button{
  padding:10px 20px;
  border:none;
  border-radius:10px;
  margin-left:10px;
  background:linear-gradient(45deg,cyan,purple);
  color:#fff;
  cursor:pointer;
}

.tasks{
  margin-top:30px;
  max-height:300px;
  overflow-y:auto;
}

.task{
  margin:10px auto;
  padding:10px;
  width:60%;
  background:rgba(255,255,255,0.1);
  border-radius:10px;
  display:flex;
  justify-content:space-between;
  align-items:center;
}

.timer{
  margin-top:30px;
  font-size:2rem;
}

.card{
  margin-top:20px;
  padding:15px;
  background:rgba(255,255,255,0.05);
  border-radius:15px;
}

</style>
</head>
<body>

<canvas id="bg"></canvas>

<div class="container">
  <h1>FOCUS X</h1>
  <p>Study. Focus. Execute.</p>

  <div>
    <input id="taskInput" placeholder="Enter your task...">
    <button onclick="addTask()">Add</button>
  </div>

  <div class="tasks" id="tasks"></div>

  <div class="card">
    <h2>Pomodoro Timer</h2>
    <div class="timer" id="timer">25:00</div>
    <button onclick="startTimer()">Start</button>
    <button onclick="resetTimer()">Reset</button>
  </div>
</div>

<script>
// STARFIELD BACKGROUND
const canvas = document.getElementById('bg');
const ctx = canvas.getContext('2d');
canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let stars=[];
for(let i=0;i<200;i++){
 stars.push({x:Math.random()*canvas.width,y:Math.random()*canvas.height,z:Math.random()*canvas.width});
}

function draw(){
 ctx.fillStyle="black";
 ctx.fillRect(0,0,canvas.width,canvas.height);
 for(let s of stars){
  s.z--;
  if(s.z<=0)s.z=canvas.width;
  let k=128/s.z;
  let x=s.x*k+canvas.width/2;
  let y=s.y*k+canvas.height/2;
  let size=(1-s.z/canvas.width)*3;
  ctx.fillStyle="white";
  ctx.fillRect(x,y,size,size);
 }
 requestAnimationFrame(draw);
}
draw();

// TASK SYSTEM
function addTask(){
 let input=document.getElementById('taskInput');
 let task=input.value;
 if(task==='')return;

 let div=document.createElement('div');
 div.className='task';
 div.innerHTML=`${task} <button onclick="this.parentElement.remove()">X</button>`;
 document.getElementById('tasks').appendChild(div);
 input.value='';
}

// TIMER
let time=1500;
let interval;

function startTimer(){
 if(interval)return;
 interval=setInterval(()=>{
  if(time<=0){clearInterval(interval);interval=null;return}
  time--;
  updateTimer();
 },1000);
}

function resetTimer(){
 clearInterval(interval);
 interval=null;
 time=1500;
 updateTimer();
}

function updateTimer(){
 let m=Math.floor(time/60);
 let s=time%60;
 document.getElementById('timer').innerText=
  `${m.toString().padStart(2,'0')}:${s.toString().padStart(2,'0')}`;
}

</script>

</body>
</html>
