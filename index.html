<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JARVIS ULTIMATE</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Orbitron',sans-serif}
body{background:#020617;color:#0ff;overflow:hidden}
canvas{position:fixed;top:0;left:0;z-index:-1}

/* BOOT */
#boot{position:fixed;inset:0;background:black;display:flex;justify-content:center;align-items:center;flex-direction:column;z-index:999}
#boot h1{animation:glow 1.5s infinite alternate}
@keyframes glow{from{text-shadow:0 0 10px cyan}to{text-shadow:0 0 40px blue}}

/* CORE */
.core{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%)}
.ring{
 width:300px;height:300px;border-radius:50%;
 border:2px solid cyan;
 box-shadow:0 0 60px cyan, inset 0 0 40px blue;
 animation:spin 8s linear infinite
}
@keyframes spin{to{transform:translate(-50%,-50%) rotate(360deg)}}

/* PANELS */
.panel{
 position:absolute;
 padding:15px;
 border-radius:12px;
 border:1px solid rgba(0,255,255,0.3);
 background:rgba(0,255,255,0.05);
 backdrop-filter:blur(15px);
 box-shadow:0 0 20px rgba(0,255,255,0.2);
 cursor:move;
 transition:0.3s;
}
.panel:hover{box-shadow:0 0 40px cyan}

#ai{top:20px;left:20px}
#stats{top:20px;right:20px}
#map{bottom:120px;left:20px}
#news{bottom:120px;right:20px}

/* CONSOLE */
.console{
 position:absolute;bottom:20px;left:50%;transform:translateX(-50%);
 width:90%;max-width:900px;
 border:1px solid rgba(0,255,255,0.3);
 border-radius:12px;
 background:rgba(0,255,255,0.05);
 backdrop-filter:blur(15px);
}

.log{height:150px;overflow:auto;padding:10px;color:#9ff}

input{
 width:75%;padding:10px;border-radius:8px;
 background:#000;border:1px solid cyan;color:#0ff
}
button{
 padding:10px 15px;border:none;border-radius:8px;
 background:linear-gradient(45deg,cyan,blue);
 color:#000;cursor:pointer;margin-left:5px
}
button:hover{box-shadow:0 0 20px cyan}

.wave{display:none;justify-content:center;gap:4px;margin:10px}
.bar{width:4px;height:10px;background:cyan;animation:wave 1s infinite}
@keyframes wave{50%{height:25px}}

</style>
</head>

<body>

<div id="boot">
<h1>JARVIS INITIALIZING...</h1>
<p>Loading Systems...</p>
</div>

<canvas id="bg"></canvas>

<div class="core"><div class="ring"></div></div>

<div id="ai" class="panel">AI CORE<br><small id="response">Ready</small></div>
<div id="stats" class="panel">CPU: <span id="cpu"></span>%<br>RAM: <span id="ram"></span>%</div>
<div id="map" class="panel">🌍<br><iframe src="https://maps.google.com/maps?q=India&output=embed" width="220" height="150"></iframe></div>
<div id="news" class="panel">📰<br><small id="newsData">Loading...</small></div>

<div class="console">
<div class="log" id="log"></div>
<div style="padding:10px">
<input id="cmd" placeholder="Type or say command">
<button onclick="runCmd()">Run</button>
<button onclick="startVoice()">🎤</button>
</div>
<div class="wave" id="wave">
<div class="bar"></div><div class="bar"></div><div class="bar"></div>
</div>
</div>

<script>
// BOOT
setTimeout(()=>boot.style.display='none',2500)

// STARFIELD
const c=bg,ctx=c.getContext('2d');c.width=innerWidth;c.height=innerHeight;
let stars=Array.from({length:400},()=>({x:Math.random()*c.width,y:Math.random()*c.height,z:Math.random()*c.width}))
function draw(){ctx.fillStyle='#000';ctx.fillRect(0,0,c.width,c.height);
for(let s of stars){s.z-=2;if(s.z<=0)s.z=c.width;
let k=128/s.z,x=s.x*k+c.width/2,y=s.y*k+c.height/2;
ctx.fillStyle='cyan';ctx.fillRect(x,y,2,2)}requestAnimationFrame(draw)}draw()

// DRAG
for(let p of document.querySelectorAll('.panel')){
let d=false,ox,oy;
p.onmousedown=e=>{d=true;ox=e.offsetX;oy=e.offsetY}
window.onmouseup=()=>d=false
window.onmousemove=e=>{if(d){p.style.left=e.clientX-ox+'px';p.style.top=e.clientY-oy+'px'}}}

// STATS
setInterval(()=>{
cpu.innerText=Math.floor(Math.random()*100)
ram.innerText=Math.floor(Math.random()*100)
},1000)

// NEWS
fetch('https://api.currentsapi.services/v1/latest-news?language=en&apiKey=demo')
.then(r=>r.json()).then(d=>newsData.innerText=d.news?.[0]?.title||'Unavailable')
.catch(()=>newsData.innerText='Unavailable')

// LOG
function log(t){let d=document.createElement('div');d.textContent=t;logEl.appendChild(d);logEl.scrollTop=9999}

// COMMAND
function runCmd(){
let v=cmd.value.toLowerCase();
log('> '+v)
if(v.includes('time')) speak(new Date().toLocaleTimeString())
else if(v.includes('youtube')) open('https://youtube.com')
else if(v.includes('search')) open('https://google.com/search?q='+v.replace('search',''))
else speak('Unknown command')
}

// SPEAK
function speak(t){speechSynthesis.speak(new SpeechSynthesisUtterance(t));response.innerText=t}

// VOICE (RELIABLE START)
let rec,active=false
function startVoice(){
const SR=window.SpeechRecognition||window.webkitSpeechRecognition
if(!SR){alert('Not supported');return}
rec=new SR();rec.continuous=true;rec.lang='en-US'
wave.style.display='flex'
rec.onresult=e=>{
let t=e.results[e.results.length-1][0].transcript.toLowerCase()
console.log(t)
if(t.includes('hey jarvis')){active=true;speak('Yes Sir');return}
if(active){cmd.value=t;runCmd();active=false}
}
rec.start()
}

</script>

</body>
</html>
