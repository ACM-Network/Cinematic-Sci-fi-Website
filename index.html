<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IRIS AI - Ultra UI</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Orbitron',sans-serif}
body{
  background:radial-gradient(circle at center,#020617,#000);
  color:#00f7ff;
  overflow:hidden;
}

canvas{position:fixed;top:0;left:0;z-index:-1}

/* BOOT */
#boot{
 position:fixed;
 inset:0;
 background:black;
 display:flex;
 flex-direction:column;
 justify-content:center;
 align-items:center;
 z-index:999;
 animation:fadeOut 2s ease 2s forwards;
}

@keyframes fadeOut{to{opacity:0;visibility:hidden}}

/* CENTER CORE */
.core{
 position:absolute;
 top:50%;left:50%;
 transform:translate(-50%,-50%);
 width:250px;height:250px;
 border-radius:50%;
 background:radial-gradient(circle,#00f7ff22,#000);
 box-shadow:0 0 80px #00f7ff;
 animation:pulse 2s infinite ease-in-out;
}

@keyframes pulse{
 0%,100%{transform:translate(-50%,-50%) scale(1)}
 50%{transform:translate(-50%,-50%) scale(1.1)}
}

/* HUD TOP */
.topbar{
 position:absolute;
 top:10px;
 width:100%;
 display:flex;
 justify-content:space-between;
 padding:0 20px;
}

.glass{
 background:rgba(0,255,255,0.05);
 border:1px solid rgba(0,255,255,0.2);
 backdrop-filter:blur(10px);
 padding:10px 15px;
 border-radius:10px;
 box-shadow:0 0 20px rgba(0,255,255,0.2);
}

/* CHAT PANEL */
.chat-panel{
 position:absolute;
 bottom:20px;
 left:50%;
 transform:translateX(-50%);
 width:90%;
 max-width:900px;
 border-radius:15px;
 overflow:hidden;
}

.chat{
 height:260px;
 overflow:auto;
 padding:15px;
}

.msg{margin:8px 0}
.user{color:#00f7ff}
.ai{color:#9ff}

.input-area{
 display:flex;
 gap:10px;
 padding:10px;
 border-top:1px solid rgba(0,255,255,0.2);
}

input{
 flex:1;
 padding:12px;
 border-radius:10px;
 border:1px solid cyan;
 background:#000;
 color:#0ff;
}

button{
 padding:12px 16px;
 border-radius:10px;
 border:none;
 background:linear-gradient(45deg,cyan,blue);
 color:#000;
 cursor:pointer;
}

button:hover{box-shadow:0 0 20px cyan}

/* VOICE VISUALIZER */
.visualizer{
 position:absolute;
 bottom:120px;
 left:50%;
 transform:translateX(-50%);
 display:flex;
 gap:5px;
}

.bar{
 width:4px;height:10px;background:cyan;
 animation:wave 1s infinite ease-in-out;
}

.bar:nth-child(2){animation-delay:.1s}
.bar:nth-child(3){animation-delay:.2s}
.bar:nth-child(4){animation-delay:.3s}
.bar:nth-child(5){animation-delay:.4s}

@keyframes wave{
 50%{height:30px}
}

</style>
</head>

<body>

<div id="boot">
<h1>IRIS SYSTEM BOOTING...</h1>
<p>Initializing Neural Core...</p>
</div>

<canvas id="bg"></canvas>

<div class="core"></div>

<div class="topbar">
<div class="glass" id="time"></div>
<div class="glass">IRIS ONLINE</div>
</div>

<div class="visualizer" id="viz">
<div class="bar"></div><div class="bar"></div><div class="bar"></div><div class="bar"></div><div class="bar"></div>
</div>

<div class="chat-panel glass">
<div class="chat" id="chat"></div>
<div class="input-area">
<input id="input" placeholder="Speak or type...">
<button onclick="sendMsg()">Send</button>
</div>
</div>

<script>
// CLOCK
setInterval(()=>{
 time.innerText=new Date().toLocaleTimeString();
},1000)

// STARFIELD
const c=bg,ctx=c.getContext('2d');c.width=innerWidth;c.height=innerHeight;
let stars=Array.from({length:400},()=>({x:Math.random()*c.width,y:Math.random()*c.height,z:Math.random()*c.width}))
function draw(){ctx.fillStyle='#000';ctx.fillRect(0,0,c.width,c.height);
for(let s of stars){s.z-=2;if(s.z<=0)s.z=c.width;
let k=128/s.z,x=s.x*k+c.width/2,y=s.y*k+c.height/2;
ctx.fillStyle='cyan';ctx.fillRect(x,y,2,2)}
requestAnimationFrame(draw)}draw()

// CHAT
function addUser(t){chat.innerHTML+=`<div class='msg user'>You: ${t}</div>`}
function addAI(t){chat.innerHTML+=`<div class='msg ai'>IRIS: ${t}</div>`}

async function sendMsg(){
 let t=input.value.trim();
 if(!t)return;
 addUser(t);
 input.value='';
 addAI('Thinking...');

 const res=await fetch('/api/chat',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({message:t})});
 const data=await res.json();
 const reply=data?.choices?.[0]?.message?.content || 'Error';

 chat.lastChild.remove();
 addAI(reply);
 speechSynthesis.speak(new SpeechSynthesisUtterance(reply));
}

// AUTO VOICE
let rec;
document.addEventListener('click',()=>{
 if(rec)return;
 const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
 rec=new SR();
 rec.continuous=true;
 rec.onresult=e=>{
 let t=e.results[e.results.length-1][0].transcript.toLowerCase();
 if(t.includes('hey iris')){
 speechSynthesis.speak(new SpeechSynthesisUtterance('Yes'));
 return;
 }
 input.value=t;
 sendMsg();
 };
 rec.start();
});

// GREETING
setTimeout(()=>{
 addAI('Welcome back. IRIS fully operational.');
 speechSynthesis.speak(new SpeechSynthesisUtterance('Welcome back. IRIS fully operational'));
},2500);

</script>

</body>
</html>
