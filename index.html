<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JARVIS AI SYSTEM</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Orbitron',sans-serif}
body{background:black;color:#0ff;overflow:hidden}
canvas{position:fixed;top:0;left:0;z-index:-1}

/* BOOT SCREEN */
#boot{
 position:fixed;
 inset:0;
 background:black;
 display:flex;
 justify-content:center;
 align-items:center;
 flex-direction:column;
 z-index:999;
 color:#0ff;
}

/* CORE */
.core{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%)}
.ring{width:300px;height:300px;border-radius:50%;border:2px solid cyan;animation:spin 8s linear infinite;box-shadow:0 0 40px cyan}
@keyframes spin{to{transform:translate(-50%,-50%) rotate(360deg)}}

/* PANELS */
.panel{
 position:absolute;
 padding:15px;
 border:1px solid cyan;
 border-radius:10px;
 background:rgba(0,255,255,0.05);
 cursor:move;
}

#ai{top:20px;left:20px}
#stats{top:20px;right:20px}
#map{bottom:100px;left:20px}
#news{bottom:100px;right:20px}

/* CONSOLE */
.console{
 position:absolute;
 bottom:20px;
 left:50%;
 transform:translateX(-50%);
 width:80%;
 border:1px solid cyan;
 padding:10px;
 background:rgba(0,255,255,0.05);
}

input{width:80%;padding:10px;background:black;border:1px solid cyan;color:#0ff}
button{padding:10px;background:cyan;border:none;cursor:pointer}

</style>
</head>
<body>

<div id="boot">
<h1>INITIALIZING JARVIS...</h1>
<p>Loading Systems...</p>
</div>

<canvas id="bg"></canvas>

<div class="core">
<div class="ring"></div>
</div>

<div id="ai" class="panel">AI CORE<br><small id="response">Ready...</small></div>
<div id="stats" class="panel">CPU: <span id="cpu"></span>%<br>RAM: <span id="ram"></span>%</div>
<div id="map" class="panel">🌍 Maps<br><iframe src="https://maps.google.com/maps?q=India&output=embed" width="200" height="150"></iframe></div>
<div id="news" class="panel">📰 News<br><small id="newsData">Loading...</small></div>

<div class="console">
<input id="cmd" placeholder="Say or type command...">
<button onclick="runCmd()">Run</button>
</div>

<script>
// BOOT
setTimeout(()=>{document.getElementById('boot').style.display='none'},3000);

// STARFIELD
const c=document.getElementById('bg');const ctx=c.getContext('2d');c.width=innerWidth;c.height=innerHeight;
let stars=Array.from({length:300},()=>({x:Math.random()*c.width,y:Math.random()*c.height,z:Math.random()*c.width}));
function draw(){ctx.fillStyle="black";ctx.fillRect(0,0,c.width,c.height);
for(let s of stars){s.z--;if(s.z<=0)s.z=c.width;let k=128/s.z;let x=s.x*k+c.width/2;let y=s.y*k+c.height/2;ctx.fillStyle="cyan";ctx.fillRect(x,y,2,2);}requestAnimationFrame(draw)}draw();

// FAKE STATS
setInterval(()=>{
 document.getElementById('cpu').innerText=Math.floor(Math.random()*100);
 document.getElementById('ram').innerText=Math.floor(Math.random()*100);
},1000);

// NEWS
fetch('https://api.currentsapi.services/v1/latest-news?language=en&apiKey=demo')
.then(r=>r.json()).then(d=>{
 if(d.news) document.getElementById('newsData').innerText=d.news[0].title;
}).catch(()=>{document.getElementById('newsData').innerText='Unavailable'});

// DRAG PANELS
document.querySelectorAll('.panel').forEach(panel=>{
 let offsetX,offsetY,isDown=false;
 panel.onmousedown=(e)=>{isDown=true;offsetX=e.offsetX;offsetY=e.offsetY}
 document.onmouseup=()=>isDown=false;
 document.onmousemove=(e)=>{
  if(isDown){panel.style.left=e.clientX-offsetX+'px';panel.style.top=e.clientY-offsetY+'px'}
 }
});

// COMMANDS
function runCmd(){
 let v=document.getElementById('cmd').value.toLowerCase();
 let res=document.getElementById('response');

 if(v.includes('hello')) res.innerText='Hello Sir';
 else if(v.includes('time')) res.innerText=new Date().toLocaleTimeString();
 else if(v.includes('open youtube')) window.open('https://youtube.com');
 else if(v.includes('search')) window.open('https://google.com/search?q='+v.replace('search',''));
 else res.innerText='Unknown Command';
}

// ===== VOICE + WAKE WORD (Hey Jarvis) =====
const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
let recognizer, isActive=false;

function initVoice(){
 if(!SR){alert('Speech Recognition not supported');return}
 recognizer=new SR();
 recognizer.continuous=true;
 recognizer.interimResults=true;
 recognizer.lang='en-US';

 recognizer.onresult=(e)=>{
  let transcript='';
  for(let i=e.resultIndex;i<e.results.length;i++){
    transcript+=e.results[i][0].transcript.toLowerCase();
  }

  // WAKE WORD DETECTION
  if(transcript.includes('hey jarvis')){
    isActive=true;
    speak('Yes Sir');
    document.getElementById('response').innerText='Listening...';
    return;
  }

  // COMMAND ONLY AFTER WAKE WORD
  if(isActive){
    document.getElementById('cmd').value=transcript;
    runCmd();
    isActive=false;
  }
 };

 recognizer.onerror=()=>{
   recognizer.stop();
   setTimeout(()=>recognizer.start(),1000);
 };

 recognizer.onend=()=>{
   setTimeout(()=>recognizer.start(),500);
 };

 recognizer.start();
}

// TEXT TO SPEECH
function speak(text){
 const u=new SpeechSynthesisUtterance(text);
 u.lang='en-US';
 speechSynthesis.speak(u);
}

initVoice();

</script>

</body>
</html>
