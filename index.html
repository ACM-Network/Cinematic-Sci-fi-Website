<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>IRIS // Ultra Interface</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Orbitron',sans-serif}
body{background:#020617;color:#8ff;overflow:hidden}
canvas{position:fixed;inset:0;z-index:-1}

/* BOOT */
#boot{position:fixed;inset:0;background:#000;display:flex;flex-direction:column;justify-content:center;align-items:center;z-index:999;animation:fade 2s 2s forwards}
@keyframes fade{to{opacity:0;visibility:hidden}}

/* CORE */
.core{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:260px;height:260px;border-radius:50%;background:radial-gradient(circle,#00f7ff33,#000);box-shadow:0 0 100px #00f7ff;animation:pulse 2s infinite}
@keyframes pulse{50%{transform:translate(-50%,-50%) scale(1.12)}}

/* HUD */
.top{position:absolute;top:10px;width:100%;display:flex;justify-content:space-between;padding:0 20px}
.glass{background:rgba(0,255,255,0.06);border:1px solid rgba(0,255,255,0.25);backdrop-filter:blur(12px);padding:10px 14px;border-radius:12px;box-shadow:0 0 20px rgba(0,255,255,0.2)}

/* CHAT */
.panel{position:absolute;bottom:20px;left:50%;transform:translateX(-50%);width:92%;max-width:920px;border-radius:16px;overflow:hidden}
.chat{height:280px;overflow:auto;padding:14px}
.msg{margin:8px 0;line-height:1.4}
.user{color:#00eaff}
.ai{color:#bff}

.input{display:flex;gap:10px;padding:12px;border-top:1px solid rgba(0,255,255,.2)}
.input input{flex:1;padding:12px;border-radius:12px;border:1px solid #00f7ff;background:#000;color:#8ff}
.input button{padding:12px 16px;border-radius:12px;border:none;background:linear-gradient(45deg,#00f7ff,#0066ff);color:#000;cursor:pointer}
.input button:hover{box-shadow:0 0 20px #00f7ff}

/* VISUALIZER */
.viz{position:absolute;bottom:120px;left:50%;transform:translateX(-50%);display:flex;gap:6px}
.bar{width:4px;height:10px;background:#00f7ff;animation:wave 1s infinite}
.bar:nth-child(2){animation-delay:.1s}.bar:nth-child(3){animation-delay:.2s}.bar:nth-child(4){animation-delay:.3s}.bar:nth-child(5){animation-delay:.4s}
@keyframes wave{50%{height:34px}}

/* PANELS */
.side{position:absolute;top:70px;right:20px;width:240px}
.card{margin-bottom:12px}

</style>
</head>
<body>

<div id="boot">
  <h1>IRIS INITIALIZING</h1>
  <p>Neural systems loading...</p>
</div>

<canvas id="bg"></canvas>
<div class="core"></div>

<div class="top">
  <div class="glass" id="time"></div>
  <div class="glass">IRIS ACTIVE</div>
</div>

<div class="side">
  <div class="glass card">Status: ONLINE</div>
  <div class="glass card" id="latency">Latency: -- ms</div>
  <div class="glass card" id="session">Session: Ready</div>
</div>

<div class="viz" id="viz">
  <div class="bar"></div><div class="bar"></div><div class="bar"></div><div class="bar"></div><div class="bar"></div>
</div>

<div class="panel glass">
  <div class="chat" id="chat"></div>
  <div class="input">
    <input id="input" placeholder="Speak or type..."/>
    <button onclick="sendMsg()">Send</button>
  </div>
</div>

<script>
// CLOCK
setInterval(()=>{time.innerText=new Date().toLocaleTimeString()},1000)

// STARFIELD
const c=bg,ctx=c.getContext('2d');c.width=innerWidth;c.height=innerHeight;
let stars=Array.from({length:500},()=>({x:Math.random()*c.width,y:Math.random()*c.height,z:Math.random()*c.width}))
function draw(){ctx.fillStyle='#000';ctx.fillRect(0,0,c.width,c.height);
for(let s of stars){s.z-=2;if(s.z<=0)s.z=c.width;let k=128/s.z,x=s.x*k+c.width/2,y=s.y*k+c.height/2;ctx.fillStyle='#00f7ff';ctx.fillRect(x,y,2,2)}requestAnimationFrame(draw)}draw()

// CHAT
function addUser(t){chat.innerHTML+=`<div class='msg user'>You: ${t}</div>`}
function addAI(t){chat.innerHTML+=`<div class='msg ai'>IRIS: ${t}</div>`}

async function sendMsg(){
 let t=input.value.trim();
 if(!t)return;
 addUser(t); input.value=''; addAI('Thinking...');
 const start=Date.now();
 try{
 const res=await fetch('/api/chat',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({message:t})});
 const data=await res.json();
 const reply=data?.choices?.[0]?.message?.content || 'Error';
 chat.lastChild.remove();
 addAI(reply);
 speechSynthesis.speak(new SpeechSynthesisUtterance(reply));
 latency.innerText='Latency: '+(Date.now()-start)+' ms';
 }catch{
 chat.lastChild.remove(); addAI('Server error');
 }
}

// VOICE AUTO
let rec;
document.addEventListener('click',()=>{
 if(rec)return;
 const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
 rec=new SR(); rec.continuous=true;
 rec.onresult=e=>{
 let t=e.results[e.results.length-1][0].transcript.toLowerCase();
 if(t.includes('hey iris')){speechSynthesis.speak(new SpeechSynthesisUtterance('Yes'));return}
 input.value=t; sendMsg();
 };
 rec.start();
});

// GREETING
setTimeout(()=>{
 addAI('Welcome back. IRIS ultra interface ready.');
 speechSynthesis.speak(new SpeechSynthesisUtterance('Welcome back. Iris ultra interface ready'));
},2500)

</script>

</body>
</html>
