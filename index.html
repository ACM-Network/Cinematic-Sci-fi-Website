<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JARVIS CORE</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Orbitron',sans-serif}
body{background:black;color:#0ff;overflow:hidden}
canvas{position:fixed;top:0;left:0;z-index:-1}

.center{
 position:absolute;
 top:50%;
 left:50%;
 transform:translate(-50%,-50%);
 text-align:center;
}

h1{
 font-size:4rem;
 text-shadow:0 0 20px cyan,0 0 40px blue;
}

.circle{
 width:300px;
 height:300px;
 border-radius:50%;
 border:2px solid cyan;
 position:absolute;
 top:50%;
 left:50%;
 transform:translate(-50%,-50%);
 animation:rotate 10s linear infinite;
 box-shadow:0 0 30px cyan;
}

.circle::before{
 content:'';
 position:absolute;
 width:260px;
 height:260px;
 border-radius:50%;
 border:2px dashed #0ff;
 top:50%;
 left:50%;
 transform:translate(-50%,-50%);
}

@keyframes rotate{
 from{transform:translate(-50%,-50%) rotate(0deg)}
 to{transform:translate(-50%,-50%) rotate(360deg)}
}

.panel{
 position:absolute;
 bottom:40px;
 width:100%;
 display:flex;
 justify-content:center;
 gap:20px;
}

.card{
 padding:15px 25px;
 border:1px solid cyan;
 border-radius:10px;
 background:rgba(0,255,255,0.05);
 backdrop-filter:blur(10px);
 transition:0.3s;
}

.card:hover{
 transform:scale(1.1);
 box-shadow:0 0 20px cyan;
}

button{
 margin-top:20px;
 padding:10px 20px;
 border:none;
 border-radius:10px;
 background:cyan;
 color:black;
 cursor:pointer;
 box-shadow:0 0 20px cyan;
}

</style>
</head>

<body>

<canvas id="bg"></canvas>

<div class="circle"></div>

<div class="center">
  <h1>JARVIS CORE</h1>
  <button onclick="activate()">ACTIVATE SYSTEM</button>
</div>

<div class="panel">
  <div class="card">SYSTEM STATUS</div>
  <div class="card">AI INTERFACE</div>
  <div class="card">DATA STREAM</div>
</div>

<script>
// STARFIELD
const canvas=document.getElementById('bg');
const ctx=canvas.getContext('2d');
canvas.width=window.innerWidth;
canvas.height=window.innerHeight;

let stars=[];
for(let i=0;i<400;i++){
 stars.push({x:Math.random()*canvas.width,y:Math.random()*canvas.height,z:Math.random()*canvas.width});
}

function draw(){
 ctx.fillStyle="black";
 ctx.fillRect(0,0,canvas.width,canvas.height);
 for(let s of stars){
  s.z-=2;
  if(s.z<=0)s.z=canvas.width;
  let k=128/s.z;
  let x=s.x*k+canvas.width/2;
  let y=s.y*k+canvas.height/2;
  let size=(1-s.z/canvas.width)*4;
  ctx.fillStyle="cyan";
  ctx.fillRect(x,y,size,size);
 }
 requestAnimationFrame(draw);
}
draw();

function activate(){
 alert("⚡ JARVIS ONLINE");
 document.body.style.background="radial-gradient(circle,#001,#000)";
}

</script>

</body>
</html>
