<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Neon Void Cinematic</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Orbitron',sans-serif}
body{background:#000;color:#fff;overflow:hidden}

canvas{position:fixed;top:0;left:0;z-index:-1}

.hero{
  height:100vh;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  text-align:center;
}

.hero h1{
  font-size:5rem;
  letter-spacing:8px;
  animation:glitch 2s infinite alternate;
}

@keyframes glitch{
  0%{text-shadow:2px 2px red,-2px -2px blue}
  50%{text-shadow:-2px -2px red,2px 2px blue}
  100%{text-shadow:2px -2px red,-2px 2px blue}
}

.hero p{margin-top:20px;color:#aaa}

.btn{
  margin-top:30px;
  padding:15px 40px;
  border:none;
  border-radius:30px;
  background:linear-gradient(45deg,#9333ea,#06b6d4);
  cursor:pointer;
  color:#fff;
  box-shadow:0 0 20px #9333ea;
  transition:0.3s;
}

.btn:hover{
  transform:scale(1.2);
  box-shadow:0 0 60px #06b6d4;
}

.features{
  position:absolute;
  bottom:50px;
  width:100%;
  display:flex;
  justify-content:center;
  gap:40px;
}

.card{
  padding:20px;
  border-radius:20px;
  backdrop-filter:blur(20px);
  background:rgba(255,255,255,0.05);
  border:1px solid rgba(255,255,255,0.1);
  transition:0.3s;
}

.card:hover{
  transform:translateY(-10px) scale(1.1);
  box-shadow:0 0 30px cyan;
}

footer{position:absolute;bottom:10px;width:100%;text-align:center;color:#666}

</style>
</head>

<body>

<canvas id="space"></canvas>

<section class="hero">
<h1>NEON VOID</h1>
<p>Enter a cinematic universe beyond space-time</p>
<button class="btn" onclick="enterUniverse()">ENTER</button>
</section>

<div class="features">
<div class="card">Quantum Travel</div>
<div class="card">AI Civilizations</div>
<div class="card">Time Collapse</div>
</div>

<footer>© 2099 Neon Void</footer>

<script>
// STARFIELD + PARTICLE SYSTEM (CINEMATIC VFX)
const canvas = document.getElementById('space');
const ctx = canvas.getContext('2d');
canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let stars = [];
for(let i=0;i<300;i++){
  stars.push({
    x:Math.random()*canvas.width,
    y:Math.random()*canvas.height,
    z:Math.random()*canvas.width
  });
}

function drawStars(){
  ctx.fillStyle="black";
  ctx.fillRect(0,0,canvas.width,canvas.height);

  for(let i=0;i<stars.length;i++){
    let star = stars[i];
    star.z--;

    if(star.z<=0){
      star.z = canvas.width;
    }

    let k = 128.0 / star.z;
    let px = star.x * k + canvas.width/2;
    let py = star.y * k + canvas.height/2;

    if(px>=0 && px<=canvas.width && py>=0 && py<=canvas.height){
      let size = (1 - star.z/canvas.width) * 3;
      ctx.fillStyle = "white";
      ctx.fillRect(px,py,size,size);
    }
  }
}

function animate(){
  drawStars();
  requestAnimationFrame(animate);
}

animate();

// RESIZE
window.addEventListener('resize',()=>{
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
});

// BUTTON FX
function enterUniverse(){
  document.body.style.background = "radial-gradient(circle,#020024,#090979,#00d4ff)";
  alert("🚀 Entered Cinematic Mode");
}

</script>

</body>
</html>
